name: dispatch-az-run-command
# Push-triggered Azure proxy. The MSO Claude Code session scoped to
# this repo (Codex-Agent) has no Azure CLI and no auth tokens. This
# workflow lets it run anything on openclaw-vm or any other VM in the
# SDNeurosurgery-OpenClaw resource group by committing a request file.
#
# Request file: .requests/az-run-command/<your-id>.json
# {
#   "vm":     "openclaw-vm",
#   "rg":     "SDNeurosurgery-OpenClaw",   // optional, defaults to SDNeurosurgery-OpenClaw
#   "script": "systemctl list-units --type=service --no-pager | grep bot"
# }
#
# Response file: .responses/az-run-command/<your-id>.json
# {
#   "stdout": "...", "stderr": "...", "exit_code": 0
# }
#
# Backed by sp-mso-cc-openclaw-diag (federated credential added 2026-05-06)
# which holds the OpenClaw Run Command Operator role on openclaw-vm
# (read VM, run shell commands, read run-command output — no start/stop/delete).
#
# As of 2026-05-14 this workflow uses the MANAGED run-command API
# (`az vm run-command create`), not the legacy `invoke`. Legacy invoke
# routes through the RunCommandLinux VM extension which wedges with
# "Run command extension execution is in progress" when an earlier
# execution sticks. Managed run-commands are independent named
# resources and don't have that pile-up failure mode.
on:
  push:
    branches:
      - '**'
    paths:
      - '.requests/az-run-command/**.json'
  workflow_dispatch:
permissions:
  id-token: write
  contents: write
jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Diagnostic context
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "request files present:"
          ls -la .requests/az-run-command/*.json 2>/dev/null || echo "  (none)"

      - uses: azure/login@v2
        with:
          client-id: be7c0d1e-927e-458c-8d33-4b5044d7250d
          tenant-id: 50186224-2255-444a-b321-60a84114115c
          subscription-id: 15a60cd5-8766-431b-a003-49f4f1b1890f

      - name: Find request files in this push
        id: find
        run: |
          set -euo pipefail
          mapfile -t REQS < <(git diff --name-only HEAD~1 HEAD -- '.requests/az-run-command/*.json' 2>/dev/null || ls .requests/az-run-command/*.json 2>/dev/null || true)
          if [ "${#REQS[@]}" -eq 0 ]; then
            echo "files=" >> "$GITHUB_OUTPUT"; exit 0
          fi
          { echo "files<<EOF"; printf '%s\n' "${REQS[@]}"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Process each request
        if: steps.find.outputs.files != ''
        env:
          REQUESTS: ${{ steps.find.outputs.files }}
        run: |
          set -euo pipefail
          mkdir -p .responses/az-run-command
          while IFS= read -r req; do
            [ -z "$req" ] && continue
            [ -f "$req" ] || continue
            name=$(basename "$req")
            echo "==> $req"

            VM=$(jq -r '.vm // "openclaw-vm"' "$req")
            RG=$(jq -r '.rg // "SDNeurosurgery-OpenClaw"' "$req")
            SCRIPT=$(jq -r '.script // ""' "$req")
            if [ -z "$SCRIPT" ]; then
              echo '{"error":"missing script"}' > ".responses/az-run-command/$name"; continue
            fi

            # Write the script to a temp file so multi-line scripts work
            echo "$SCRIPT" > /tmp/run-cmd-script.sh

            # Use the MANAGED run-command API (az vm run-command create), not the
            # legacy `invoke`. Legacy invoke goes through the RunCommandLinux VM
            # extension which piles up state and wedges with "Run command extension
            # execution is in progress" when an earlier execution sticks. Managed
            # run-commands are independent named resources without that failure mode.
            CMDNAME="proxy-$(date -u +%s)-$(echo "$name" | tr -dc 'a-zA-Z0-9-' | head -c 32)"

            set +e
            az vm run-command create -g "$RG" --vm-name "$VM" -n "$CMDNAME" \
              --script "@/tmp/run-cmd-script.sh" \
              --output json > /tmp/raw-msg.txt 2>/tmp/raw-err.txt
            RC=$?
            set -e

            STDOUT=""
            STDERR=""
            EXIT_CODE="$RC"
            if [ "$RC" -eq 0 ] && [ -s /tmp/raw-msg.txt ]; then
              STDOUT=$(jq -r '.instanceView.output // ""' /tmp/raw-msg.txt)
              STDERR=$(jq -r '.instanceView.error // ""' /tmp/raw-msg.txt)
              EXIT_CODE=$(jq -r '.instanceView.exitCode // 0' /tmp/raw-msg.txt)
            else
              STDERR=$(cat /tmp/raw-err.txt)
              [ -z "$STDERR" ] && STDERR="(az produced no output; raw-msg=$(cat /tmp/raw-msg.txt))"
            fi

            # Best-effort cleanup so named run-commands don't accumulate forever.
            # If our SP lacks delete perms this fails silently.
            az vm run-command delete -g "$RG" --vm-name "$VM" -n "$CMDNAME" --yes >/dev/null 2>&1 || true

            jq -n --arg stdout "$STDOUT" --arg stderr "$STDERR" --argjson rc "$EXIT_CODE" --arg vm "$VM" --arg rg "$RG" \
              '{vm:$vm, rg:$rg, exit_code:$rc, stdout:$stdout, stderr:$stderr}' \
              > ".responses/az-run-command/$name"
            echo "  → .responses/az-run-command/$name (rc=$EXIT_CODE stdout-bytes=${#STDOUT})"
          done <<< "$REQUESTS"

      - name: Commit response files
        if: steps.find.outputs.files != ''
        run: |
          set -euo pipefail
          git config user.name "az-proxy-bot"
          git config user.email "az-proxy-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain .responses/az-run-command/)" ]; then
            git add .responses/az-run-command/
            git commit -m "az-proxy: response for push $GITHUB_SHA"
            git push
          fi
