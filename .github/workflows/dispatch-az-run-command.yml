name: dispatch-az-run-command
# Push-triggered Azure proxy. The MSO Claude Code session scoped to
# this repo (Codex-Agent) has no Azure CLI and no auth tokens. This
# workflow lets it run anything on openclaw-vm or any other VM in the
# SDNeurosurgery-OpenClaw resource group by committing a request file.
#
# Request file: .requests/az-run-command/<your-id>.json
# {
#   "vm":     "openclaw-vm",
#   "rg":     "SDNeurosurgery-OpenClaw",   // optional, defaults to SDNeurosurgery-OpenClaw
#   "script": "systemctl list-units --type=service --no-pager | grep bot"
# }
#
# Response file: .responses/az-run-command/<your-id>.json
# {
#   "stdout": "...", "stderr": "...", "exit_code": 0
# }
#
# Backed by sp-mso-cc-openclaw-diag (federated credential added 2026-05-06)
# which holds the OpenClaw Run Command Operator role on openclaw-vm
# (read VM, run shell commands, read run-command output — no start/stop/delete).
on:
  push:
    branches:
      - '**'
    paths:
      - '.requests/az-run-command/**.json'
  workflow_dispatch:
permissions:
  id-token: write
  contents: write
jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Diagnostic context
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "event=${GITHUB_EVENT_NAME}"
          echo "request files present:"
          ls -la .requests/az-run-command/*.json 2>/dev/null || echo "  (none)"

      - uses: azure/login@v2
        with:
          client-id: be7c0d1e-927e-458c-8d33-4b5044d7250d
          tenant-id: 50186224-2255-444a-b321-60a84114115c
          subscription-id: 15a60cd5-8766-431b-a003-49f4f1b1890f

      - name: Find request files in this push
        id: find
        run: |
          set -euo pipefail
          mapfile -t REQS < <(git diff --name-only HEAD~1 HEAD -- '.requests/az-run-command/*.json' 2>/dev/null || ls .requests/az-run-command/*.json 2>/dev/null || true)
          if [ "${#REQS[@]}" -eq 0 ]; then
            echo "files=" >> "$GITHUB_OUTPUT"; exit 0
          fi
          { echo "files<<EOF"; printf '%s\n' "${REQS[@]}"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Process each request
        if: steps.find.outputs.files != ''
        env:
          REQUESTS: ${{ steps.find.outputs.files }}
        run: |
          set -euo pipefail
          mkdir -p .responses/az-run-command
          while IFS= read -r req; do
            [ -z "$req" ] && continue
            [ -f "$req" ] || continue
            name=$(basename "$req")
            echo "==> $req"

            VM=$(jq -r '.vm // "openclaw-vm"' "$req")
            RG=$(jq -r '.rg // "SDNeurosurgery-OpenClaw"' "$req")
            SCRIPT=$(jq -r '.script // ""' "$req")
            if [ -z "$SCRIPT" ]; then
              echo '{"error":"missing script"}' > ".responses/az-run-command/$name"; continue
            fi

            # Write the script to a temp file so multi-line scripts work
            echo "$SCRIPT" > /tmp/run-cmd-script.sh

            set +e
            ATTEMPT=0; MAX=32
            while : ; do
              ATTEMPT=$((ATTEMPT+1))
              az vm run-command invoke -g "$RG" -n "$VM" \
                --command-id RunShellScript \
                --scripts @/tmp/run-cmd-script.sh \
                --query "value[0].message" -o tsv > /tmp/raw-msg.txt 2>/tmp/raw-err.txt
              RC=$?
              if [ $RC -ne 0 ] && grep -qi "Run command extension execution is in progress" /tmp/raw-err.txt; then
                [ "$ATTEMPT" -ge "$MAX" ] && { echo "Conflict after $MAX tries"; break; }
                echo "Conflict on attempt $ATTEMPT, sleeping 15s…"
                sleep 15
                continue
              fi
              break
            done
            set -e

            # az's "message" field has the form:
            #   "Enable succeeded: \n[stdout]\n<stdout>\n[stderr]\n<stderr>"
            STDOUT=$(awk '/^\[stdout\]$/{flag=1; next} /^\[stderr\]$/{flag=0} flag' /tmp/raw-msg.txt)
            STDERR=$(awk '/^\[stderr\]$/{flag=1; next} flag' /tmp/raw-msg.txt)
            # If az itself failed, surface the az error so the response isn't empty.
            if [ $RC -ne 0 ] && [ -z "$STDOUT$STDERR" ]; then
              STDERR=$(cat /tmp/raw-err.txt 2>/dev/null || true)
            fi

            jq -n --arg stdout "$STDOUT" --arg stderr "$STDERR" --argjson rc "$RC" --arg vm "$VM" --arg rg "$RG" \
              '{vm:$vm, rg:$rg, exit_code:$rc, stdout:$stdout, stderr:$stderr}' \
              > ".responses/az-run-command/$name"
            echo "  → .responses/az-run-command/$name (rc=$RC stdout-bytes=${#STDOUT})"
          done <<< "$REQUESTS"

      - name: Commit response files
        if: steps.find.outputs.files != ''
        run: |
          set -euo pipefail
          git config user.name "az-proxy-bot"
          git config user.email "az-proxy-bot@users.noreply.github.com"
          if [ -z "$(git status --porcelain .responses/az-run-command/)" ]; then
            echo "no response files to commit"; exit 0
          fi
          git add .responses/az-run-command/
          git commit -m "az-proxy: response for push $GITHUB_SHA"

          # Retry-with-rebase loop to handle concurrent workflow runs
          # racing to push response files onto the same branch.
          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:$BRANCH"; then
              echo "  ✓ pushed on attempt $attempt"
              exit 0
            fi
            echo "  push attempt $attempt rejected, rebasing..."
            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH" || git rebase --abort || true
            sleep 2
          done
          echo "✗ FAILED to push after 5 retries"
          exit 1
